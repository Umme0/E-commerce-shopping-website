<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Store</h1>
        <div class="cart">
            Cart: <span id="count">0</span>
        </div>
    </header>

    <div class="container">

        <div class="product">
            <img src="https://via.placeholder.com/200">
            <h3>Headphones</h3>
            <p>₹999</p>
            <button onclick="addToCart(999)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200">
            <h3>Smart Watch</h3>
            <p>₹1999</p>
            <button onclick="addToCart(1999)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200">
            <h3>Shoes</h3>
            <p>₹1499</p>
            <button onclick="addToCart(1499)">Add to Cart</button>
        </div>

    </div>

    <div class="cart-box">
        <h2>Shopping Cart</h2>
        <p>Total: ₹<span id="total">0</span></p>
        <button onclick="clearCart()">Clear Cart</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
